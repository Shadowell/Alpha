<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公告选股系统</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260413c" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>公告选股系统</h1>
      <p id="meta">加载中...</p>
    </div>
    <div class="actions">
      <button id="btnRunNotice">公告筛选</button>
      <button id="btnRefreshNotice">刷新</button>
      <button id="btnGotoMain">返回漏斗页</button>
    </div>
  </header>

  <main class="layout">
    <section class="left-main">
      <section class="panel card">
        <h2>系统状态</h2>
        <div id="statusBar" class="status-bar">就绪</div>
      </section>

      <section class="funnel-area">
        <div class="funnel-grid">
          <div class="pool-column">
            <div class="pool-header">公告候选池 <span id="count-candidate">0</span></div>
            <div id="pool-candidate" class="pool-list"></div>
          </div>
          <div class="pool-column">
            <div class="pool-header">公告重点池 <span id="count-focus">0</span></div>
            <div id="pool-focus" class="pool-list"></div>
          </div>
          <div class="pool-column">
            <div class="pool-header">公告买入池 <span id="count-buy">0</span></div>
            <div id="pool-buy" class="pool-list"></div>
          </div>
        </div>
      </section>
    </section>

    <aside class="right-panel">
      <section class="panel card">
        <div class="panel-title-row">
          <h2>公告详情</h2>
          <div id="noticeSummary" class="summary">点击左侧股票查看</div>
        </div>
        <div id="noticeDetail" class="detail-empty">暂无详情</div>
      </section>

      <section class="panel card">
        <div class="panel-title-row">
          <h2>日K + 成交量（30日）</h2>
          <div id="stockSummary" class="summary">点击左侧股票查看</div>
        </div>
        <div id="klineChart" class="kline-chart"></div>
      </section>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="/static/notice.js?v=20260413c"></script>
</body>
</html>
