<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css?v=20260414e" />
</head>
<body>
  <!-- ========== 左侧导航栏 ========== -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">A</div>
    </div>
    <div class="sidebar-nav">
      <a class="sidebar-item active" data-tab="market" title="大盘">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><polyline points="18 9 13 14 9 10 3 16"/></svg>
        <span>大盘</span>
      </a>
      <a class="sidebar-item" data-tab="data" title="数据中心">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4.03 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/></svg>
        <span>数据中心</span>
      </a>
      <a class="sidebar-item" data-tab="funnel" title="策略选股">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>策略选股</span>
      </a>
      <a class="sidebar-item" data-tab="notice" title="公告选股">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>公告选股</span>
      </a>
      <a class="sidebar-item" data-tab="agent" title="Agent">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        <span>Agent</span>
      </a>
    </div>
    <div class="sidebar-bottom">
      <a class="sidebar-item" id="btnRefreshSidebar" title="刷新数据">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        <span>刷新</span>
      </a>
    </div>
  </nav>

  <!-- ========== 主区域 ========== -->
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">大盘</h1>
        <p id="meta">加载中...</p>
      </div>
      <div class="actions"></div>
    </header>

    <main class="layout">
      <section class="center-main">
        <!-- ========== 大盘 ========== -->
        <section id="tab-market" class="tab-content active">
          <section class="panel card">
            <h2>热门概念 Top10</h2>
            <div id="hotConcepts" class="hot-list"></div>
          </section>
          <section class="panel card">
            <h2>热门个股 Top10</h2>
            <div id="hotStocks" class="hot-stock-list"></div>
          </section>
        </section>

        <!-- ========== 数据中心 ========== -->
        <section id="tab-data" class="tab-content">
          <div class="dc-stats-grid" id="dcStatsGrid"></div>
          <div class="dc-body">
            <div class="dc-left">
              <section class="dc-control card panel">
                <div class="panel-title-row">
                  <h2>同步控制</h2>
                </div>
                <div class="dc-control-btns">
                  <button id="btnDcFullSync" class="btn-action">全量同步（智能补缺）</button>
                  <div class="dc-incr-row">
                    <input type="date" id="dcSyncDate" class="sync-date-input" />
                    <button id="btnDcIncrSync" class="btn-incremental">增量同步</button>
                  </div>
                </div>
                <div class="dc-progress-section" id="dcProgressSection" style="display:none">
                  <div id="dcProgressText" class="dc-progress-text"></div>
                  <div class="sync-progress-wrap"><div id="dcProgressBar" class="sync-progress-bar"></div></div>
                </div>
              </section>
              <section class="dc-tasks card panel">
                <div class="panel-title-row">
                  <h2>任务历史</h2>
                </div>
                <div id="dcTaskList" class="dc-task-list"></div>
                <div id="dcTaskPager" class="dc-task-pager"></div>
              </section>
            </div>
            <div class="dc-right">
              <section class="dc-report card panel">
                <div class="panel-title-row">
                  <h2>数据完整性检查</h2>
                  <button id="btnDcCheck" class="btn-action">手动检查</button>
                </div>
                <div id="dcReportContent" class="dc-report-content">
                  <div class="detail-empty">暂无检查报告</div>
                </div>
              </section>
              <section class="dc-logs card panel">
                <div class="panel-title-row">
                  <h2>同步日志流</h2>
                </div>
                <div id="dcLogStream" class="dc-log-stream"></div>
              </section>
            </div>
          </div>
        </section>

        <!-- ========== 策略选股 ========== -->
        <section id="tab-funnel" class="tab-content">
          <div class="tab-toolbar">
            <div class="filter-line">
              <span>概念筛选：</span>
              <span id="activeConcept" class="chip muted">全部</span>
              <button id="clearConcept" class="text-btn">清除</button>
            </div>
            <button id="btnEodScreen" class="btn-action">盘后筛选</button>
          </div>

          <section class="funnel-area">
            <div class="funnel-grid">
              <div class="pool-column">
                <div class="pool-header">调整期候选池 <span id="count-candidate" class="pool-count">0</span></div>
                <div id="pool-candidate" class="pool-list"></div>
              </div>
              <div class="pool-column highlight-focus">
                <div class="pool-header">重点关注池 <span id="count-focus" class="pool-count">0</span></div>
                <div id="pool-focus" class="pool-list"></div>
              </div>
              <div class="pool-column highlight-buy">
                <div class="pool-header">买入池 <span id="count-buy" class="pool-count">0</span></div>
                <div id="pool-buy" class="pool-list"></div>
              </div>
            </div>
          </section>
        </section>

        <!-- ========== 公告选股 ========== -->
        <section id="tab-notice" class="tab-content">
          <div class="tab-toolbar notice-toolbar">
            <div class="notice-toolbar-top">
              <div class="panel-title-row" style="margin-bottom:0">
                <h2 style="margin:0">公告概览</h2>
                <div id="noticeMeta" class="summary">暂无数据</div>
              </div>
              <button id="btnNoticeScreen" class="btn-action">公告筛选</button>
            </div>
            <div class="keyword-filter">
              <span class="keyword-label">关键词：</span>
              <div id="keywordTags" class="keyword-tags"></div>
            </div>
          </div>

          <section class="funnel-area">
            <div class="funnel-grid">
              <div class="pool-column">
                <div class="pool-header">公告候选池 <span id="notice-count-candidate" class="pool-count">0</span></div>
                <div id="notice-pool-candidate" class="pool-list"></div>
              </div>
              <div class="pool-column highlight-focus">
                <div class="pool-header">公告重点池 <span id="notice-count-focus" class="pool-count">0</span></div>
                <div id="notice-pool-focus" class="pool-list"></div>
              </div>
              <div class="pool-column highlight-buy">
                <div class="pool-header">公告买入池 <span id="notice-count-buy" class="pool-count">0</span></div>
                <div id="notice-pool-buy" class="pool-list"></div>
              </div>
            </div>
          </section>
        </section>

        <!-- ========== Hermes Agent ========== -->
        <section id="tab-agent" class="tab-content">
          <div class="agent-page">
            <div class="agent-status-bar" id="agentStatusBar">
              <span class="agent-status-dot" id="agentStatusDot"></span>
              <span id="agentStatusText">加载中...</span>
              <button id="btnAgentRun" class="btn-action" style="margin-left:auto">手动触发复盘</button>
            </div>

            <div class="agent-section">
              <h3>待审批提案 <span id="agentPendingCount" class="pool-count">0</span></h3>
              <div id="agentProposals" class="agent-proposals"></div>
            </div>

            <div class="agent-section">
              <h3>最近运行记录</h3>
              <div id="agentTasks" class="agent-tasks"></div>
            </div>
          </div>
        </section>

      </section>

      <aside class="right-panel">
        <section id="noticeDetailCard" class="panel card" style="display:none">
          <div class="panel-title-row">
            <h2>公告详情</h2>
            <div id="noticeSummary" class="summary">点击左侧股票查看</div>
          </div>
          <div id="noticeDetail" class="detail-empty">暂无详情</div>
        </section>

        <section class="panel card">
          <div class="panel-title-row">
            <h2>日K + 成交量（30日）</h2>
            <div id="stockSummary" class="summary">点击左侧股票查看</div>
          </div>
          <div id="klineChart" class="kline-chart"></div>
        </section>
      </aside>
    </main>
  </div>

  <!-- Kronos 预测弹窗 -->
  <div id="predictModal" class="predict-modal-overlay" style="display:none">
    <div class="predict-modal">
      <div class="predict-modal-header">
        <h3 id="predictModalTitle">预测加载中...</h3>
        <button id="predictModalClose" class="predict-modal-close">&times;</button>
      </div>
      <div id="predictModalSubtitle" class="predict-modal-subtitle"></div>
      <div id="predictChart" class="predict-chart"></div>
      <div id="predictStatus" class="predict-status"></div>
      <div id="predictSummary" class="predict-summary"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="/static/app.js?v=20260414e"></script>
</body>
</html>
